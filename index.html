<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="inner_container">
        <header class="cardH1">
            <h1>temparature converter</h1>
        </header>
        <form class="card_contents">
            <input type="number" id="myInput" class="input_box">
            <input type="radio" id="toFahrenheit" name="unit">
            <label for="toFahrenheit">celcius to fahrenheit</label>
            <input type="radio" id="toCelcius" name="unit">
            <label for="toCelcius">fahrenheit to celcius</label>
            <button type="submit" id="mySubmit">submit</button>
        </form>
        <div class="result_container">
            <p id="result"></p>
        </div>
    </div>




    <script src="script.js"></script>
</body>
</html>
